services:
  raft1:
    build: .
    command:
      - ./build/raft_grpc_node
      - --id
      - "1"
      - --listen
      - 0.0.0.0:5001
      - --advertise
      - raft1:5001
      - --data
      - /data/node1
      - --peer
      - 2=raft2:5002
      - --peer
      - 3=raft3:5003
    ports:
      - "5001:5001"
    volumes:
      - raft1-data:/data

  raft2:
    build: .
    command:
      - ./build/raft_grpc_node
      - --id
      - "2"
      - --listen
      - 0.0.0.0:5002
      - --advertise
      - raft2:5002
      - --data
      - /data/node2
      - --peer
      - 1=raft1:5001
      - --peer
      - 3=raft3:5003
    ports:
      - "5002:5002"
    volumes:
      - raft2-data:/data

  raft3:
    build: .
    command:
      - ./build/raft_grpc_node
      - --id
      - "3"
      - --listen
      - 0.0.0.0:5003
      - --advertise
      - raft3:5003
      - --data
      - /data/node3
      - --peer
      - 1=raft1:5001
      - --peer
      - 2=raft2:5002
    ports:
      - "5003:5003"
    volumes:
      - raft3-data:/data

  raft5-1:
    build: .
    profiles: ["five-node"]
    command: ["./build/raft_grpc_node", "--id", "1", "--listen", "0.0.0.0:5101", "--advertise", "raft5-1:5101", "--data", "/data/node1", "--peer", "2=raft5-2:5102", "--peer", "3=raft5-3:5103", "--peer", "4=raft5-4:5104", "--peer", "5=raft5-5:5105"]
    ports:
      - "5101:5101"
    volumes:
      - raft5-1-data:/data

  raft5-2:
    build: .
    profiles: ["five-node"]
    command: ["./build/raft_grpc_node", "--id", "2", "--listen", "0.0.0.0:5102", "--advertise", "raft5-2:5102", "--data", "/data/node2", "--peer", "1=raft5-1:5101", "--peer", "3=raft5-3:5103", "--peer", "4=raft5-4:5104", "--peer", "5=raft5-5:5105"]
    ports:
      - "5102:5102"
    volumes:
      - raft5-2-data:/data

  raft5-3:
    build: .
    profiles: ["five-node"]
    command: ["./build/raft_grpc_node", "--id", "3", "--listen", "0.0.0.0:5103", "--advertise", "raft5-3:5103", "--data", "/data/node3", "--peer", "1=raft5-1:5101", "--peer", "2=raft5-2:5102", "--peer", "4=raft5-4:5104", "--peer", "5=raft5-5:5105"]
    ports:
      - "5103:5103"
    volumes:
      - raft5-3-data:/data

  raft5-4:
    build: .
    profiles: ["five-node"]
    command: ["./build/raft_grpc_node", "--id", "4", "--listen", "0.0.0.0:5104", "--advertise", "raft5-4:5104", "--data", "/data/node4", "--peer", "1=raft5-1:5101", "--peer", "2=raft5-2:5102", "--peer", "3=raft5-3:5103", "--peer", "5=raft5-5:5105"]
    ports:
      - "5104:5104"
    volumes:
      - raft5-4-data:/data

  raft5-5:
    build: .
    profiles: ["five-node"]
    command: ["./build/raft_grpc_node", "--id", "5", "--listen", "0.0.0.0:5105", "--advertise", "raft5-5:5105", "--data", "/data/node5", "--peer", "1=raft5-1:5101", "--peer", "2=raft5-2:5102", "--peer", "3=raft5-3:5103", "--peer", "4=raft5-4:5104"]
    ports:
      - "5105:5105"
    volumes:
      - raft5-5-data:/data

volumes:
  raft1-data:
  raft2-data:
  raft3-data:
  raft5-1-data:
  raft5-2-data:
  raft5-3-data:
  raft5-4-data:
  raft5-5-data:
