syntax = "proto3";

package raftkv.proto;

service Raft {
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
  rpc InstallSnapshot(InstallSnapshotRequest) returns (InstallSnapshotResponse);
  rpc ClientCommand(ClientCommandRequest) returns (ClientCommandResponse);
}

enum CommandType {
  COMMAND_TYPE_NOOP = 0;
  COMMAND_TYPE_PUT = 1;
  COMMAND_TYPE_DELETE = 2;
  COMMAND_TYPE_GET = 3;
  COMMAND_TYPE_ADD_SERVER = 4;
  COMMAND_TYPE_REMOVE_SERVER = 5;
}

message Command {
  CommandType type = 1;
  string key = 2;
  string value = 3;
  string client_id = 4;
  uint64 sequence = 5;
  int32 node_id = 6;
}

message LogEntry {
  uint64 index = 1;
  uint64 term = 2;
  Command command = 3;
}

message RequestVoteRequest {
  uint64 term = 1;
  int32 candidate_id = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
}

message RequestVoteResponse {
  uint64 term = 1;
  bool vote_granted = 2;
}

message AppendEntriesRequest {
  uint64 term = 1;
  int32 leader_id = 2;
  uint64 prev_log_index = 3;
  uint64 prev_log_term = 4;
  repeated LogEntry entries = 5;
  uint64 leader_commit = 6;
}

message AppendEntriesResponse {
  uint64 term = 1;
  bool success = 2;
  uint64 match_index = 3;
  uint64 conflict_index = 4;
  uint64 conflict_term = 5;
}

message CommandResult {
  bool ok = 1;
  optional string value = 2;
  string error = 3;
  uint64 index = 4;
}

message DedupRecord {
  uint64 sequence = 1;
  CommandResult result = 2;
}

message SnapshotEntry {
  string key = 1;
  string value = 2;
}

message SnapshotDedupEntry {
  string client_id = 1;
  DedupRecord record = 2;
}

message Snapshot {
  uint64 last_included_index = 1;
  uint64 last_included_term = 2;
  repeated SnapshotEntry kv = 3;
  repeated SnapshotDedupEntry dedup = 4;
}

message InstallSnapshotRequest {
  uint64 term = 1;
  int32 leader_id = 2;
  Snapshot snapshot = 3;
}

message InstallSnapshotResponse {
  uint64 term = 1;
  bool success = 2;
  uint64 last_included_index = 3;
}

message ClientCommandRequest {
  Command command = 1;
}

message ClientCommandResponse {
  enum Status {
    STATUS_OK = 0;
    STATUS_NOT_LEADER = 1;
    STATUS_TIMEOUT = 2;
    STATUS_FAILED = 3;
  }

  Status status = 1;
  optional int32 leader_id = 2;
  CommandResult result = 3;
  string message = 4;
}
